<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Custom rule editor placeholder</title><desc id="desc">Wireframe showing a natural-language review rule and repository scope.</desc>
  <rect width="1200" height="620" fill="#F1ECE0"/><rect x="110" y="55" width="980" height="510" rx="18" fill="#FFFFFF" stroke="#1E2D4A" stroke-width="3"/>
  <text x="160" y="118" fill="#1E2D4A" font-family="serif" font-size="34" font-weight="700">Create review rule</text><text x="160" y="170" fill="#1E2D4A" font-family="sans-serif" font-size="16" font-weight="700">Rule</text>
  <rect x="160" y="190" width="880" height="135" rx="10" fill="#FAF9F5" stroke="#C7C0B5"/><text x="190" y="235" fill="#1E2D4A" font-family="sans-serif" font-size="18">Payment webhooks must be idempotent and include a test</text><text x="190" y="270" fill="#1E2D4A" font-family="sans-serif" font-size="18">for repeated delivery.</text>
  <text x="160" y="380" fill="#1E2D4A" font-family="sans-serif" font-size="16" font-weight="700">Repository scope</text><rect x="160" y="402" width="360" height="48" rx="8" fill="#E9FDF8" stroke="#00A88A"/><text x="184" y="432" fill="#1E2D4A" font-family="monospace" font-size="16">payments-service</text>
  <rect x="820" y="402" width="220" height="48" rx="8" fill="#1E2D4A"/><text x="930" y="432" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="16">Create rule</text>
  <text x="600" y="522" text-anchor="middle" fill="#1E2D4A" font-family="monospace" font-size="14">PLACEHOLDER — CONFIRM FIELDS AND LABELS</text>
</svg>
