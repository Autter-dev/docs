  <g><rect x="120" y="150" width="250" height="90" rx="10" fill="#E9FDF8"/><rect x="395" y="150" width="250" height="90" rx="10" fill="#FAF9F5" stroke="#C7C0B5"/><rect x="670" y="150" width="250" height="90" rx="10" fill="#FAF9F5" stroke="#C7C0B5"/></g>
  <g fill="#1E2D4A" font-family="sans-serif"><text x="145" y="182" font-size="14">HIGH PRIORITY</text><text x="145" y="224" font-size="30" font-weight="700">3</text><text x="420" y="182" font-size="14">DEPENDENCIES</text><text x="420" y="224" font-size="30" font-weight="700">7</text><text x="695" y="182" font-size="14">CODE QUALITY</text><text x="695" y="224" font-size="30" font-weight="700">12</text></g>
