  <rect x="340" y="462" width="520" height="30" rx="15" fill="#1E2D4A"/><text x="600" y="483" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="14">PLACEHOLDER — ADD APPROVED AUTHORIZATION SCREEN</text>
