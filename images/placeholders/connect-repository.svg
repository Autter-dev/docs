<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Connect a repository placeholder</title><desc id="desc">Wireframe showing GitHub and GitLab connection choices and repository access.</desc>
  <rect width="1200" height="620" fill="#F1ECE0"/><rect x="90" y="60" width="1020" height="500" rx="20" fill="#FFFFFF" stroke="#1E2D4A" stroke-width="3"/>
  <text x="150" y="130" fill="#1E2D4A" font-family="serif" font-size="34" font-weight="700">Connect a repository</text><text x="150" y="168" fill="#4B5563" font-family="sans-serif" font-size="18">Choose your source control provider, then select repository access.</text>
  <rect x="150" y="220" width="400" height="170" rx="14" fill="#FAF9F5" stroke="#1E2D4A"/><rect x="650" y="220" width="400" height="170" rx="14" fill="#FAF9F5" stroke="#1E2D4A"/>
