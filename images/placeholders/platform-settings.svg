  <g><rect x="952" y="230" width="70" height="34" rx="17" fill="#00A88A"/><circle cx="1004" cy="247" r="13" fill="#FFFFFF"/><rect x="952" y="300" width="70" height="34" rx="17" fill="#00A88A"/><circle cx="1004" cy="317" r="13" fill="#FFFFFF"/><rect x="952" y="370" width="70" height="34" rx="17" fill="#1E2D4A"/><circle cx="970" cy="387" r="13" fill="#FFFFFF"/></g>
  <text x="735" y="530" text-anchor="middle" fill="#1E2D4A" font-family="monospace" font-size="14">PLACEHOLDER — CONFIRM LABELS BEFORE REPLACEMENT</text>
