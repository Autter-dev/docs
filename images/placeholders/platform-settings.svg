<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Platform settings placeholder</title><desc id="desc">Wireframe of review, rule, pipeline, and integration settings.</desc>
  <rect width="1200" height="620" fill="#F1ECE0"/><rect x="60" y="48" width="1080" height="524" rx="18" fill="#FFFFFF" stroke="#1E2D4A" stroke-width="3"/>
  <text x="110" y="110" fill="#1E2D4A" font-family="serif" font-size="34" font-weight="700">Settings</text>
  <g font-family="sans-serif" font-size="18"><rect x="110" y="150" width="230" height="54" rx="8" fill="#1E2D4A"/><text x="140" y="184" fill="#FFFFFF">Review behavior</text><text x="140" y="242" fill="#1E2D4A">Team rules</text><text x="140" y="300" fill="#1E2D4A">Pipeline checks</text><text x="140" y="358" fill="#1E2D4A">Integrations</text></g>
